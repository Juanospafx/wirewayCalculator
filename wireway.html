<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brightronix Wireway Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
            <div class="logo-container">
                <img src="css/logo-text.png" alt="Brightronix" class="logo-full">
                <div class="app-subtitle">Wireway Calc</div>
            </div>
            <button id="btnThemeToggle" class="theme-btn" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div class="view-switcher">
            <a class="view-btn" href="electrical-room.html" style="text-decoration: none;">
                <i class="fa-solid fa-ruler-combined"></i>
                <span>Room Designer</span>
            </a>
            <a class="view-btn active" href="wireway.html" style="text-decoration: none;">
                <i class="fa-solid fa-grip-lines-vertical"></i>
                <span>Wireway Calc</span>
            </a>
        </div>

        <div class="card-box" id="feederBox" style="padding: 1.5rem; margin-bottom: 2rem; border-left: 5px solid var(--border-subtle);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <span style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 0.9rem; color: var(--text-primary);">MAIN FEEDER</span>
                <button id="btnFeederToggle" class="btn-toggle active" onclick="toggleFeeder()">ON</button>
            </div>
            <div id="feederContent">
                <div class="input-group">
                    <label class="input-label">Connection Type</label>
                    <select id="feederType" class="input-std" onchange="updateFeederType()">
                        <option value="DIRECT">Direct Conduit</option>
                        <option value="DISCONNECT">Disconnect Switch</option>
                        <option value="CT_CABINET">CT Cabinet</option>
                    </select>
                </div>
                <div id="feederDynamicFields"></div>
            </div>
        </div>
        <div>
            <h2>ADD NEW LOAD</h2>
            <button class="btn-add" onclick="addLoad('PANELBOARD')">
                <i class="fa-solid fa-server" style="color: var(--blue-500);"></i> Panelboard
            </button>
            <button class="btn-add" onclick="addLoad('DISCONNECT')">
                <i class="fa-solid fa-power-off" style="color: var(--emerald-500);"></i> Disconnect
            </button>
            <button class="btn-add" onclick="addLoad('METER')">
                <i class="fa-solid fa-tachometer-alt" style="color: var(--amber-500);"></i> Meter
            </button>
            <button class="btn-add" onclick="addLoad('CT_CABINET')">
                <i class="fa-solid fa-box-archive" style="color: var(--purple-500);"></i> CT Cabinet
            </button>
        </div>
    </div>

    <div class="main-content">
        <div id="wc-main-content">
            <div class="top-bar">
                <div style="flex:1;">
                    <h2 style="margin:0; font-size:1rem; color: var(--text-primary); letter-spacing: -0.01em;">DASHBOARD</h2>
                    <span id="itemsCount" style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">0 Active Loads</span>
                </div>
                <div style="display: flex; align-items: center; gap: 2rem;">
                    <div style="text-align: right; font-family: 'Inter', sans-serif;">
                        <div style="font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Total Length</div>
                        <div style="display: flex; align-items: baseline; justify-content: flex-end; gap: 0.5rem;">
                            <span id="totalIn" style="font-size: 2rem; font-weight: 900; color: var(--text-primary); letter-spacing: -0.03em;">0.0</span>
                            <span style="font-size: 1rem; font-weight: 700; color: var(--text-muted);">in</span>
                        </div>
                        <div id="totalFt" style="font-size: 0.85rem; font-weight: 600; color: var(--accent-primary);">0.00 FT</div>
                    </div>
                    <div id="headerActions"></div>
                </div>
            </div>
            <div class="workspace">
                <div style="margin-bottom: 2rem;">
                    <span style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted); display:block; margin-bottom: 0.5rem; text-transform: uppercase;">Load Details</span>
                    <div class="card-box" style="display: flex; flex-direction: column; overflow: hidden;">
                        <div id="loadListContainer" style="padding: 0; max-height: 400px; overflow-y: auto;"></div>
                    </div>
                </div>
                <div>
                    <span class="section-title">Visual Layout</span>
                    <div class="card-box" style="padding: 1rem; position: relative; min-height: 250px; display: flex; align-items: center;">
                        <div id="svgContainer" style="width: 100%; overflow-x: auto; display: flex;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="printArea"></div>

    <script src="wareway_script.js"></script>
</body>
</html>
