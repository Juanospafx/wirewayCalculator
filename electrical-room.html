<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brightronix Electrical Room Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
            
            <div class="logo-container">
                <img src="css/logo-text.png" alt="Brightronix" class="logo-full">
                <div class="app-subtitle">Electrical Room Designer</div>
            </div>
            <button id="btnThemeToggle" class="theme-btn" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div class="card-box" style="padding: 1.5rem; margin-bottom: 2rem;">
            <span class="section-title">Room Configuration</span>
            <div style="margin-bottom: 1rem;">
                <label class="input-label">Active Walls</label>
                <div class="wall-selector" id="wallActivatorContainer">
                </div>
            </div>
            <div id="wallDimensionsContainer">
            </div>
        </div>

        <div>
            <span class="section-title">Power Distribution</span>
            <div class="grid-2">
                <button class="btn-add btn-add-sm" onclick="addLoad('PANELBOARD')">
                    <i class="fa-solid fa-server" style="color: var(--blue-500);"></i> Panelboard
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('DISCONNECT')">
                <i class="fa-solid fa-power-off" style="color: var(--emerald-500);"></i> Disconnect
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('METER')">
                <i class="fa-solid fa-tachometer-alt" style="color: var(--amber-500);"></i> Meter
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('CT_CABINET')">
                <i class="fa-solid fa-box" style="color: #06b6d4;"></i> CT Cabinet
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('TRANSFORMER')">
                    <i class="fa-solid fa-bolt" style="color: #6366f1;"></i> Transformer
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('WIREWAY')">
                    <i class="fa-solid fa-grip-lines" style="color: #64748b;"></i> Wireway
                </button>
            </div>

            <span class="section-title" style="margin-top: 1.5rem;">Low Voltage / Backboards</span>
            <div class="grid-2">
                <button class="btn-add btn-add-sm" onclick="addLoad('PLYWOOD_4')">
                    <i class="fa-solid fa-border-all" style="color: var(--purple-500);"></i> Ply 4'
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('PLYWOOD_8')">
                    <i class="fa-solid fa-border-all" style="color: var(--purple-500);"></i> Ply 8'
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('TTB')">
                    <i class="fa-solid fa-network-wired" style="color: var(--purple-500);"></i> TTB
                </button>
                <button class="btn-add btn-add-sm" onclick="addLoad('CUSTOM_LV')">
                    <i class="fa-solid fa-pen-ruler" style="color: var(--purple-500);"></i> Custom
                </button>
            </div>

            <span class="section-title" style="margin-top: 1.5rem;">Layout Tools</span>
            <div>
                <button class="btn-add" onclick="addLoad('SPACE')">
                    <i class="fa-solid fa-arrows-left-right-to-line" style="color: var(--text-muted);"></i> Add Space / Gap
                </button>
            </div>

            <span class="section-title" style="margin-top: 1.5rem;">Modules</span>
            <a class="btn-add module-link" href="wireway.html">
                <i class="fa-solid fa-grip-lines" style="color: #64748b;"></i> Wireway Calculator
            </a>
        </div>
    </div>

    <div class="main-content">
        
        <div class="top-bar">
            <div style="flex:1;">
                <h2 style="margin:0; font-size:1rem; color: var(--text-primary); letter-spacing: -0.01em;">ROOM LAYOUT</h2>
                <span id="activeWallLabel" style="font-size: 0.8rem; color: var(--accent-primary); font-weight: 700;">Wall 1 Selected</span>
            </div>
            
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div style="text-align: right; font-family: 'Inter', sans-serif;">
                    <div style="font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Wall Usage</div>
                    <div style="display: flex; align-items: baseline; justify-content: flex-end; gap: 0.5rem;">
                        <span id="wallUsagePct" style="font-size: 2rem; font-weight: 900; color: var(--text-primary); letter-spacing: -0.03em;">0%</span>
                    </div>
                    <div id="wallUsageText" style="font-size: 0.85rem; font-weight: 600; color: var(--accent-primary);">0" / 120"</div>
                </div>
                <div id="headerActions"></div>
            </div>
        </div>

        <div class="workspace">

            <div style="margin-bottom: 2rem;">
                <span class="section-title">Visual Layout (Elevations)</span>
                <div class="card-box" style="padding: 1rem; position: relative; min-height: 500px; display: flex; align-items: center;">
                    <div id="svgContainer" class="carousel-container"></div>
                </div>
            </div>
            
            <div>
                <span class="section-title">Selected Wall Items</span>
                <div class="card-box" style="display: flex; flex-direction: column; overflow: hidden;">
                    <div id="loadListContainer" style="padding: 0; max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="printArea"></div>

    <script src="script.js"></script>
</body>
</html>
