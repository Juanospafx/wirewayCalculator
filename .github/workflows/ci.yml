name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  php_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP syntax check
        run: |
          set -e
          files=$(find . -name "*.php" -not -path "./vendor/*")
          if [ -z "$files" ]; then
            echo "No PHP files found."
            exit 0
          fi
          for f in $files; do php -l "$f" > /dev/null; done
          echo "PHP lint OK"
